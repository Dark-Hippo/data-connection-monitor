name: Publish containers

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    name: Publish ${{ matrix.image }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: data-connection-monitor
            context: ./DataConnectionMonitor
            dockerfile: ./DataConnectionMonitor/Dockerfile

          - image: data-connection-monitor-api
            context: ./DataConnectionMonitorAPI
            dockerfile: ./DataConnectionMonitorAPI/Dockerfile

          - image: data-connection-monitor-ui
            context: ./DataConnectionMonitorUI
            dockerfile: ./DataConnectionMonitorUI/Dockerfile

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Normalise owner name
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ matrix.image }}:latest
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}